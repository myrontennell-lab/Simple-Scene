<!DOCTYPE html>
<html>
<head>
  <title>Urban Scene – Myron Tennell</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>
<body>
  <a-scene shadow="type: pcfsoft" fog="type: linear; color: #aabbbb; near:10; far:50">

    <!-- Assets -->
    <a-assets>
      <!-- Grass -->
      <img id="grass-base" src="assets/Grass_005_BaseColor.jpg">
      <img id="grass-ambient-occlusion" src="assets/Grass_005_AmbientOcclusion.jpg">
      <img id="grass-normal" src="assets/Grass_005_Normal.jpg">
      <!-- Tree leaves and trunks -->
      <img id="sphericaltreeleaves-base" src="assets/Stylized_Leaves_001_basecolor.jpg">
      <img id="sphericaltreeleaves-ambient-occlusion" src="assets/Stylized_Leaves_001_ambientOcclusion.jpg">
      <img id="sphericaltreeleaves-normal" src="assets/Stylized_Leaves_001_normal.jpg">
      <img id="treetrunk-base" src="assets/Bark_06_basecolor.jpg">
      <img id="treetrunk-ambient-occlusion" src="assets/Bark_06_ambientOcclusion.jpg">
      <img id="treetrunk-normal" src="assets/Bark_06_normal.jpg">
    </a-assets>

    <!-- Ground -->
    <a-plane
      material="src: #grass-base; repeat: 100 100; ambientOcclusionMap: #grass-ambient-occlusion; ambientOcclusionTextureRepeat: 100 100; normalMap: #grass-normal; normalTextureRepeat: 100 100"
      rotation="-90 0 0" width="200" height="200" shadow>
    </a-plane>

    <!-- Sky -->
    <a-sky color="#87ceeb"></a-sky>

    <!-- Lighting -->
    <a-entity light="type: directional; intensity: 1" position="10 20 10" castShadow></a-entity>
    <a-entity light="type: ambient; intensity: 0.4"></a-entity>

    <!-- Camera -->
    <a-entity camera position="0 2 15" wasd-controls look-controls>
      <a-entity cursor="fuse: false; rayOrigin: mouse"></a-entity>
    </a-entity>

    <!-- Buildings -->
    <a-box color="#b0c4de" depth="10" width="8" height="15" position="-15 7.5 -20" shadow></a-box>
    <a-box color="#a0522d" depth="8" width="6" height="10" position="10 5 -25" shadow></a-box>
    <a-box color="#4682b4" depth="6" width="6" height="12" position="0 6 -30" shadow></a-box>
    <a-box color="#708090" depth="12" width="10" height="20" position="20 10 -15" shadow></a-box>

    <!-- Trees -->
    <a-mixin id="treetrunk" material="src: #treetrunk-base; repeat: 3 5; ambientOcclusionMap: #treetrunk-ambient-occlusion; ambientOcclusionTextureRepeat: 3 5; normalMap: #treetrunk-normal; normalTextureRepeat: 3 5" geometry="primitive: cylinder; radius:0.3; height:4"></a-mixin>
    <a-mixin id="sphericaltreeleaves" material="src: #sphericaltreeleaves-base; repeat: 8 8; ambientOcclusionMap: #sphericaltreeleaves-ambient-occlusion; ambientOcclusionTextureRepeat: 8 8; normalMap: #sphericaltreeleaves-normal; normalTextureRepeat: 8 8;" geometry="primitive: sphere; radius:1.5"></a-mixin>

    <a-cylinder mixin="treetrunk" position="-10 2 -10" shadow></a-cylinder>
    <a-sphere mixin="sphericaltreeleaves" position="-10 4 -10" shadow></a-sphere>
    <a-cylinder mixin="treetrunk" position="12 2 -12" shadow></a-cylinder>
    <a-sphere mixin="sphericaltreeleaves" position="12 4 -12" shadow></a-sphere>

    <!-- Roads -->
    <a-plane color="#333" rotation="-90 0 0" width="200" height="5" position="0 0.01 -5" shadow></a-plane>
    <a-plane color="#333" rotation="-90 0 0" width="200" height="5" position="0 0.01 -15" shadow></a-plane>

  </a-scene>
</body>
</html>
