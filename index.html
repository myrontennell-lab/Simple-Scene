<!DOCTYPE html>
<html>
<head>
  <title>Simple Scene – Myron Tennell</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>
<body>
  <a-scene shadow="type: pcfsoft">

    <!-- Assets -->
    <a-assets>
      <img id="grass" src="assets/Grass_005_BaseColor.jpg">
      <img id="leaves" src="assets/Stylized_Leaves_001_basecolor.jpg">
      <img id="bark" src="assets/Bark_06_basecolor.jpg">
    </a-assets>

    <!-- Ground -->
    <a-plane src="#grass" repeat="50 50" rotation="-90 0 0" width="100" height="100" shadow></a-plane>

    <!-- Sky -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- Lighting -->
    <a-entity light="type: directional; intensity: 1" position="5 10 5" castShadow></a-entity>
    <a-entity light="type: ambient; intensity: 0.4"></a-entity>

    <!-- Camera -->
    <a-entity camera position="0 2 10" wasd-controls look-controls></a-entity>

    <!-- HOUSE -->
    <!-- Base -->
    <a-box position="0 1 -5" width="4" height="2" depth="4" color="#d2b48c" shadow></a-box>

    <!-- Roof -->
    <a-cone position="0 3 -5" radius-bottom="3" height="2" color="#8b0000" shadow></a-cone>

    <!-- Door -->
    <a-box position="0 0.75 -3" width="1" height="1.5" depth="0.1" color="#654321"></a-box>

    <!-- TREES -->
    <!-- Tree 1 -->
    <a-cylinder src="#bark" position="-5 1 -5" height="2" radius="0.3" shadow></a-cylinder>
    <a-sphere src="#leaves" position="-5 3 -5" radius="1.5" shadow></a-sphere>

    <!-- Tree 2 -->
    <a-cylinder src="#bark" position="5 1 -6" height="2" radius="0.3" shadow></a-cylinder>
    <a-sphere src="#leaves" position="5 3 -6" radius="1.5" shadow></a-sphere>

    <!-- Tree 3 -->
    <a-cylinder src="#bark" position="2 1 -10" height="2" radius="0.3" shadow></a-cylinder>
    <a-sphere src="#leaves" position="2 3 -10" radius="1.5" shadow></a-sphere>

    <!-- ROAD -->
    <a-plane color="#333" rotation="-90 0 0" width="100" height="4" position="0 0.01 -2"></a-plane>

    <!-- Road lines -->
    <a-plane color="#fff" rotation="-90 0 0" width="2" height="0.2" position="0 0.02 -2"></a-plane>
    <a-plane color="#fff" rotation="-90 0 0" width="2" height="0.2" position="4 0.02 -2"></a-plane>
    <a-plane color="#fff" rotation="-90 0 0" width="2" height="0.2" position="-4 0.02 -2"></a-plane>

  </a-scene>
</body>
</html>
